<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ninja Luxe — Caffeine Guide</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <img
          src="https://www.ninjakitchen.co.uk/images/ninja-logo.svg"
          alt="Ninja"
          class="ninja-logo"
          onerror="this.style.display='none'"
        />
        <div class="header-text">
          <h1>Caffeine Guide</h1>
          <p class="header-sub">Ninja Luxe Café Premier</p>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
    </div>
  </header>

  <main id="app">
    <!-- rendered by app.js -->
  </main>

  <footer class="site-footer">
    <p class="footer-note">Caffeine values are approximate based on standard espresso shot yields.</p>
  </footer>

  <script type="module" src="src/app.js"></script>
</body>
</html>
